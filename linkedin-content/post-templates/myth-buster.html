<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Myth Buster — NOVARIS</title>
  <link rel="preload" href="/fonts/fonts.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="/fonts/fonts.css" /></noscript>
  <link rel="stylesheet" href="/styles.min.css" />
  <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/montserrat-700.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .card {
      width: 1080px; height: 1080px;
      background: linear-gradient(165deg, #0D0A14 0%, #150C1E 25%, #1A0F28 50%, #0F0A1C 100%);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* ── Grain ── */
    .grain { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Layered glows ── */
    .glow-red { position: absolute; width: 700px; height: 500px; top: -80px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(239,68,68,0.10) 0%, rgba(239,68,68,0.02) 50%, transparent 70%);
      z-index: 2; }
    .glow-blue { position: absolute; width: 500px; height: 500px; bottom: -100px; right: -80px;
      background: radial-gradient(ellipse, rgba(79,163,227,0.07) 0%, transparent 65%);
      z-index: 2; }
    .glow-center { position: absolute; width: 900px; height: 600px; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, rgba(30,20,50,0.4) 0%, transparent 70%);
      z-index: 2; }

    /* ── Big X watermark ── */
    .x-mark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%);
      font-size: 500px; font-family: 'Montserrat', sans-serif; font-weight: 900;
      color: transparent; z-index: 3;
      -webkit-text-stroke: 1px rgba(239,68,68,0.035);
      letter-spacing: -0.05em; }

    /* ── Diagonal strike line ── */
    .strike-line { position: absolute; top: 44%; left: 50%;
      width: 700px; height: 2px; z-index: 4;
      transform: translate(-50%, -50%) rotate(-6deg);
      background: linear-gradient(90deg, transparent, rgba(239,68,68,0.12) 20%, rgba(239,68,68,0.20) 50%, rgba(239,68,68,0.12) 80%, transparent);
    }

    /* ── Corner accents ── */
    .corner-tl { position: absolute; top: 60px; left: 60px; z-index: 5; }
    .corner-tl::before { content: ''; position: absolute; top: 0; left: 0; width: 80px; height: 1px;
      background: linear-gradient(90deg, rgba(239,68,68,0.25), transparent); }
    .corner-tl::after { content: ''; position: absolute; top: 0; left: 0; width: 1px; height: 80px;
      background: linear-gradient(180deg, rgba(239,68,68,0.25), transparent); }
    .corner-br { position: absolute; bottom: 60px; right: 60px; z-index: 5; }
    .corner-br::before { content: ''; position: absolute; bottom: 0; right: 0; width: 80px; height: 1px;
      background: linear-gradient(270deg, rgba(79,163,227,0.25), transparent); }
    .corner-br::after { content: ''; position: absolute; bottom: 0; right: 0; width: 1px; height: 80px;
      background: linear-gradient(0deg, rgba(79,163,227,0.25), transparent); }

    /* ── Content ── */
    .content { position: relative; z-index: 10; text-align: center; padding: 70px 80px; max-width: 960px; }

    .badge { display: inline-flex; align-items: center; gap: 10px;
      background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15);
      border-radius: 50px; padding: 10px 28px; font-family: 'Montserrat', sans-serif;
      font-weight: 800; font-size: 13px; color: #F87171; text-transform: uppercase;
      letter-spacing: 0.15em; margin-bottom: 50px;
      box-shadow: 0 0 40px rgba(239,68,68,0.04); }
    .badge-icon { width: 16px; height: 16px; opacity: 0.8; }

    .myth { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 44px;
      color: #fff; letter-spacing: -0.03em; line-height: 1.25; margin-bottom: 44px; }
    .myth .strike { text-decoration: line-through; text-decoration-color: #EF4444;
      text-decoration-thickness: 3px; color: rgba(255,255,255,0.28); }

    .divider { display: flex; align-items: center; gap: 16px; justify-content: center; margin: 0 auto 44px; }
    .divider-line { width: 60px; height: 1px; }
    .divider-line-l { background: linear-gradient(90deg, transparent, rgba(239,68,68,0.35)); }
    .divider-line-r { background: linear-gradient(90deg, rgba(79,163,227,0.35), transparent); }
    .divider-icon { width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, #EF4444, #4FA3E3);
      box-shadow: 0 0 12px rgba(239,68,68,0.25), 0 0 12px rgba(79,163,227,0.25); }

    .truth { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 33px;
      color: #4FA3E3; letter-spacing: -0.02em; line-height: 1.35; margin-bottom: 28px;
      text-shadow: 0 0 40px rgba(79,163,227,0.12); }

    .desc { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 18px;
      color: rgba(255,255,255,0.38); max-width: 650px; line-height: 1.7; margin: 0 auto; }

    /* ── Bottom ── */
    .bottom-bar { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 16px; z-index: 10; }
    .bottom-bar .line { width: 30px; height: 1px; background: rgba(79,163,227,0.2); }
    .bottom-bar .url { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px;
      color: rgba(79,163,227,0.35); letter-spacing: 0.12em; }

    .accent-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent 5%, #DC2626 20%, #EF4444 35%, #4FA3E3 65%, #3A7FD4 80%, transparent 95%);
      z-index: 10; }
    .accent-top { position: absolute; top: 0; left: 0; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(239,68,68,0.06) 30%, rgba(239,68,68,0.06) 70%, transparent);
      z-index: 10; }
  </style>
</head>
<body style="margin:0;padding:0;background:#0D0A14;width:1080px;height:1080px;overflow:hidden;">
  <div class="card">
    <svg class="grain" xmlns="http://www.w3.org/2000/svg">
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#g)" opacity="0.04"/>
    </svg>

    <div class="glow-red"></div>
    <div class="glow-blue"></div>
    <div class="glow-center"></div>
    <div class="x-mark">X</div>
    <div class="strike-line"></div>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="content">
      <div class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
        </svg>
        Mythos vs. Realit&auml;t
      </div>
      <div class="myth">"<span class="strike">Wir machen keine Forschung</span>"</div>
      <div class="divider">
        <div class="divider-line divider-line-l"></div>
        <div class="divider-icon"></div>
        <div class="divider-line divider-line-r"></div>
      </div>
      <div class="truth">8 von 10 Unternehmen haben<br/>f&ouml;rderf&auml;hige F&amp;E-Projekte.</div>
      <div class="desc">Produktentwicklung, Prototypenbau, Optimierung &mdash;<br/>das alles kann Forschung im Sinne des FZulG sein.</div>
    </div>

    <div class="bottom-bar">
      <div class="line"></div>
      <div class="url">novaris-consulting.com</div>
      <div class="line"></div>
    </div>
    <div class="accent-top"></div>
    <div class="accent-line"></div>
  </div>
</body>
</html>
