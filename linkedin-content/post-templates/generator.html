<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Post Generator — NOVARIS</title>
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <link rel="stylesheet" href="/styles.min.css" />
  <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/montserrat-700.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .card {
      width: 1080px; height: 1080px;
      background: linear-gradient(155deg, #070F1C 0%, #0B1929 30%, #0F2747 60%, #0A1C38 100%);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* ── Grain texture ── */
    .grain { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Grid background ── */
    .grid-bg { position: absolute; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(79,163,227,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,163,227,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 30%, transparent 80%);
    }

    /* ── Layered glows ── */
    .glow-center { position: absolute; width: 800px; height: 800px; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(30,86,181,0.18) 0%, rgba(30,86,181,0.05) 40%, transparent 65%);
      z-index: 2; }
    .glow-top { position: absolute; width: 600px; height: 400px; top: -120px; right: -60px;
      background: radial-gradient(ellipse, rgba(79,163,227,0.12) 0%, transparent 65%);
      z-index: 2; }
    .glow-bottom { position: absolute; width: 500px; height: 400px; bottom: -100px; left: -60px;
      background: radial-gradient(ellipse, rgba(58,127,212,0.08) 0%, transparent 65%);
      z-index: 2; }

    /* ── Decorative rings ── */
    .ring { position: absolute; border-radius: 50%; z-index: 3; }
    .ring-1 { width: 650px; height: 650px; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(79,163,227,0.06); }
    .ring-2 { width: 900px; height: 900px; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(79,163,227,0.03); }
    .ring-3 { width: 400px; height: 400px; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border: 1px dashed rgba(79,163,227,0.05); }

    /* ── Geometric accents ── */
    .geo-line-1 { position: absolute; top: 80px; left: 80px; width: 120px; height: 1px;
      background: linear-gradient(90deg, rgba(79,163,227,0.2), transparent); z-index: 4; }
    .geo-line-2 { position: absolute; top: 80px; left: 80px; width: 1px; height: 120px;
      background: linear-gradient(180deg, rgba(79,163,227,0.2), transparent); z-index: 4; }
    .geo-line-3 { position: absolute; bottom: 80px; right: 80px; width: 120px; height: 1px;
      background: linear-gradient(270deg, rgba(79,163,227,0.2), transparent); z-index: 4; }
    .geo-line-4 { position: absolute; bottom: 80px; right: 80px; width: 1px; height: 120px;
      background: linear-gradient(0deg, rgba(79,163,227,0.2), transparent); z-index: 4; }
    .geo-dot { position: absolute; width: 4px; height: 4px; border-radius: 50%; z-index: 5; }
    .geo-dot-tl { top: 78px; left: 78px; background: rgba(79,163,227,0.35); }
    .geo-dot-br { bottom: 78px; right: 78px; background: rgba(79,163,227,0.35); }

    /* ── Content ── */
    .content { position: relative; z-index: 10; text-align: center; padding: 0 80px; }
    .logo { height: 36px; margin-bottom: 70px; opacity: 0.45;
      filter: drop-shadow(0 0 20px rgba(79,163,227,0.15)); }

    .big-number {
      font-family: 'Montserrat', sans-serif; font-weight: 900;
      font-size: 170px; line-height: 1; letter-spacing: -0.04em;
      background: linear-gradient(175deg, #FFFFFF 20%, #4FA3E3 70%, #3A7FD4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 80px rgba(79,163,227,0.25)) drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }
    .big-number.green {
      background: linear-gradient(175deg, #FFFFFF 20%, #34D399 65%, #059669 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 80px rgba(52,211,153,0.25)) drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }
    .big-number.red {
      background: linear-gradient(175deg, #FFFFFF 20%, #F87171 65%, #DC2626 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 80px rgba(239,68,68,0.25)) drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }
    .big-number.gold {
      background: linear-gradient(175deg, #FFFFFF 20%, #FBBF24 65%, #D97706 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 80px rgba(245,158,11,0.25)) drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }
    .big-number.small { font-size: 115px; }
    .big-number.xsmall { font-size: 85px; }

    /* ── Decorative divider under number ── */
    .num-divider { width: 60px; height: 2px; margin: 0 auto 32px;
      background: linear-gradient(90deg, transparent, rgba(79,163,227,0.5), transparent);
      border-radius: 1px; }
    .green ~ .num-divider,
    .num-divider.green-div { background: linear-gradient(90deg, transparent, rgba(52,211,153,0.5), transparent); }
    .red ~ .num-divider,
    .num-divider.red-div { background: linear-gradient(90deg, transparent, rgba(239,68,68,0.5), transparent); }
    .gold ~ .num-divider,
    .num-divider.gold-div { background: linear-gradient(90deg, transparent, rgba(245,158,11,0.5), transparent); }

    .subtitle { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 30px;
      color: rgba(255,255,255,0.92); letter-spacing: -0.02em; margin-bottom: 16px;
      line-height: 1.3; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 18px;
      color: rgba(255,255,255,0.4); max-width: 620px; line-height: 1.7;
      margin: 0 auto; }

    /* ── Bottom bar ── */
    .bottom-bar { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 16px; z-index: 10; }
    .bottom-bar .line { width: 30px; height: 1px; background: rgba(79,163,227,0.25); }
    .bottom-bar .url { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px;
      color: rgba(79,163,227,0.4); letter-spacing: 0.12em; text-transform: lowercase; }

    /* ── Accent lines ── */
    .accent-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent 5%, #1E56B5 25%, #4FA3E3 50%, #3A7FD4 75%, transparent 95%);
      z-index: 10; }
    .accent-line.green-line {
      background: linear-gradient(90deg, transparent 5%, #059669 25%, #34D399 50%, #4FA3E3 75%, transparent 95%); }
    .accent-line.red-line {
      background: linear-gradient(90deg, transparent 5%, #DC2626 25%, #F87171 50%, #4FA3E3 75%, transparent 95%); }
    .accent-line.gold-line {
      background: linear-gradient(90deg, transparent 5%, #D97706 25%, #FBBF24 50%, #4FA3E3 75%, transparent 95%); }
    .accent-top { position: absolute; top: 0; left: 0; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(79,163,227,0.1) 30%, rgba(79,163,227,0.1) 70%, transparent);
      z-index: 10; }
  </style>
</head>
<body style="margin:0;padding:0;background:#070F1C;width:1080px;height:1080px;overflow:hidden;">
  <div class="card" id="card">
    <!-- Grain texture -->
    <svg class="grain" xmlns="http://www.w3.org/2000/svg">
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#g)" opacity="0.04"/>
    </svg>

    <!-- Background layers -->
    <div class="grid-bg"></div>
    <div class="glow-center" id="glowCenter"></div>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>

    <!-- Corner accents -->
    <div class="geo-line-1"></div>
    <div class="geo-line-2"></div>
    <div class="geo-line-3"></div>
    <div class="geo-line-4"></div>
    <div class="geo-dot geo-dot-tl"></div>
    <div class="geo-dot geo-dot-br"></div>

    <!-- Content -->
    <div class="content">
      <img class="logo" src="/brand_assets/Logo V5-light.svg" alt="NOVARIS" width="230" height="72" loading="lazy">
      <div class="big-number" id="number"></div>
      <div class="num-divider" id="numDivider"></div>
      <div class="subtitle" id="sub"></div>
      <div class="desc" id="desc"></div>
    </div>

    <!-- Bottom -->
    <div class="bottom-bar">
      <div class="line"></div>
      <div class="url">novaris-consulting.com</div>
      <div class="line"></div>
    </div>
    <div class="accent-top"></div>
    <div class="accent-line" id="accentLine"></div>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const num = document.getElementById('number');
    const sub = document.getElementById('sub');
    const desc = document.getElementById('desc');
    const line = document.getElementById('accentLine');
    const glow = document.getElementById('glowCenter');
    const divider = document.getElementById('numDivider');

    num.textContent = decodeURIComponent(p.get('n') || '35%');
    sub.textContent = decodeURIComponent(p.get('s') || 'Subtitle');
    desc.textContent = decodeURIComponent(p.get('d') || 'Description');

    const c = p.get('c');
    if (c === 'green') {
      num.classList.add('green'); line.classList.add('green-line'); divider.classList.add('green-div');
      glow.style.background = 'radial-gradient(circle, rgba(52,211,153,0.12) 0%, rgba(52,211,153,0.03) 40%, transparent 65%)';
    }
    if (c === 'red') {
      num.classList.add('red'); line.classList.add('red-line'); divider.classList.add('red-div');
      glow.style.background = 'radial-gradient(circle, rgba(239,68,68,0.12) 0%, rgba(239,68,68,0.03) 40%, transparent 65%)';
    }
    if (c === 'gold') {
      num.classList.add('gold'); line.classList.add('gold-line'); divider.classList.add('gold-div');
      glow.style.background = 'radial-gradient(circle, rgba(245,158,11,0.12) 0%, rgba(245,158,11,0.03) 40%, transparent 65%)';
    }
    if (p.get('size') === 'small') num.classList.add('small');
    if (p.get('size') === 'xsmall') num.classList.add('xsmall');
  </script>
</body>
</html>
