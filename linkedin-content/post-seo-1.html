<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>SEO Post 1 — Forschungszulage Infografik</title>
  <link rel="stylesheet" href="/fonts/fonts.css" />
  <link rel="stylesheet" href="/styles.min.css" />
  <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/montserrat-700.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .card {
      width: 1200px; height: 1200px;
      background: linear-gradient(145deg, #0A1C38 0%, #0F2747 30%, #123E6B 70%, #0F2747 100%);
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
    }
    .grain { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .glow1 { position: absolute; width: 800px; height: 800px; top: -300px; right: -200px;
      background: radial-gradient(circle, rgba(30,109,181,0.25) 0%, transparent 60%); z-index: 2; }
    .glow2 { position: absolute; width: 600px; height: 600px; bottom: -200px; left: -100px;
      background: radial-gradient(circle, rgba(79,163,227,0.15) 0%, transparent 60%); z-index: 2; }
    .content { position: relative; z-index: 10; text-align: center; padding: 60px; }
    .logo { height: 48px; margin-bottom: 50px; opacity: 0.7; }
    .headline { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 38px;
      color: #fff; letter-spacing: -0.03em; margin-bottom: 60px; line-height: 1.3; }
    .headline .blue { color: #4FA3E3; }
    .facts { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 900px; margin: 0 auto 50px; }
    .fact { background: rgba(255,255,255,0.04); border: 1px solid rgba(79,163,227,0.15);
      border-radius: 16px; padding: 30px; text-align: left; }
    .fact-label { font-size: 13px; color: rgba(255,255,255,0.5); text-transform: uppercase;
      letter-spacing: 0.12em; margin-bottom: 8px; }
    .fact-value { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 42px;
      color: #4FA3E3; letter-spacing: -0.03em; line-height: 1; }
    .fact-value.green { color: #34D399; }
    .fact-desc { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 8px; line-height: 1.5; }
    .cta { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 18px;
      color: #4FA3E3; letter-spacing: 0.05em; }
    .bar { width: 80px; height: 3px; background: linear-gradient(90deg, #1E6DB5, #4FA3E3);
      border-radius: 2px; margin: 0 auto 30px; }
    .bottom-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, #1E6DB5 30%, #4FA3E3 70%, transparent); z-index: 10; }
    .grid-bg { position: absolute; inset: 0; z-index: 1;
      background-image: linear-gradient(rgba(79,163,227,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,163,227,0.03) 1px, transparent 1px);
      background-size: 60px 60px; }
  </style>
</head>
<body style="margin:0; padding:0; background:#0F2747; width:1200px; height:1200px; overflow:hidden;">
  <div class="card">
    <svg class="grain" xmlns="http://www.w3.org/2000/svg">
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#g)" opacity="0.06"/>
    </svg>
    <div class="grid-bg"></div>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="content">
      <img class="logo" src="/brand_assets/Logo V5-light.svg" alt="NOVARIS" width="230" height="72" loading="lazy">
      <div class="bar"></div>
      <div class="headline">Forschungszulage 2026:<br/><span class="blue">Alles auf einen Blick.</span></div>
      <div class="facts">
        <div class="fact">
          <div class="fact-label">Fördersatz KMU</div>
          <div class="fact-value">35 %</div>
          <div class="fact-desc">Ihrer F&E-Personalkosten zurück</div>
        </div>
        <div class="fact">
          <div class="fact-label">Max. Förderung / Jahr</div>
          <div class="fact-value">4,2 Mio. €</div>
          <div class="fact-desc">Steuergutschrift, keine Rückzahlung</div>
        </div>
        <div class="fact">
          <div class="fact-label">Erfolgsquote NOVARIS</div>
          <div class="fact-value green">100 %</div>
          <div class="fact-desc">Kein einziger abgelehnter Antrag</div>
        </div>
        <div class="fact">
          <div class="fact-label">Rückwirkend ab</div>
          <div class="fact-value">2020</div>
          <div class="fact-desc">Bis zu 6 Jahre nachholen</div>
        </div>
      </div>
      <div class="cta">novaris-consulting.com</div>
    </div>
    <div class="bottom-line"></div>
  </div>
</body>
</html>
