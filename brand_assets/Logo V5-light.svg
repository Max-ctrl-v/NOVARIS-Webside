<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 82" fill="none">
  <defs>
    <!-- Bar gradient: navy-400 → navy-200 (bottom to top) — matches site accent scale -->
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3A7FD4"/>
      <stop offset="100%" stop-color="#7ECEF5"/>
    </linearGradient>
    <!-- Line gradient: navy-300 → navy-100 (left to right) -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4DAEE5"/>
      <stop offset="100%" stop-color="#C2E8FB"/>
    </linearGradient>
    <!-- Soft bar glow — color-tinted blur behind bars -->
    <filter id="barGlow" x="-50%" y="-30%" width="200%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.3 0 0 0 0.18  0 0.5 0 0 0.42  0 0 1 0 0.62  0 0 0 0.55 0" result="tinted"/>
      <feMerge>
        <feMergeNode in="tinted"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Line glow — stronger, layered blur -->
    <filter id="lineGlow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Top dot glow — bright navy-200 halo -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C2E8FB" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7ECEF5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4DAEE5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- "NOV" — Montserrat ExtraBold 800 exact outlines, white for dark backgrounds -->
  <path d="M15.09 48L6.94 48L6.94 18.60L13.79 18.60L26.76 34.27L26.76 18.60L34.91 18.60L34.91 48L28.07 48L15.09 32.33L15.09 48ZM55.62 48.59L55.62 48.59Q52.09 48.59 49.11 47.45Q46.13 46.32 43.92 44.26Q41.72 42.20 40.50 39.41Q39.28 36.62 39.28 33.30L39.28 33.30Q39.28 29.98 40.50 27.19Q41.72 24.40 43.92 22.34Q46.13 20.28 49.11 19.15Q52.09 18.01 55.62 18.01L55.62 18.01Q59.15 18.01 62.13 19.15Q65.11 20.28 67.31 22.34Q69.52 24.40 70.74 27.19Q71.96 29.98 71.96 33.30L71.96 33.30Q71.96 36.62 70.74 39.41Q69.52 42.20 67.31 44.26Q65.11 46.32 62.13 47.45Q59.15 48.59 55.62 48.59ZM55.62 41.70L55.62 41.70Q57.84 41.70 59.65 40.67Q61.46 39.64 62.51 37.75Q63.56 35.86 63.56 33.30L63.56 33.30Q63.56 30.74 62.51 28.85Q61.46 26.96 59.65 25.93Q57.84 24.90 55.62 24.90L55.62 24.90Q53.39 24.90 51.59 25.93Q49.78 26.96 48.73 28.85Q47.68 30.74 47.68 33.30L47.68 33.30Q47.68 35.86 48.73 37.75Q49.78 39.64 51.59 40.67Q53.39 41.70 55.62 41.70ZM93.54 48L85.35 48L72.80 18.60L81.78 18.60L89.76 37.75L97.91 18.60L106.14 18.60L93.54 48Z" fill="#FFFFFF"/>

  <!-- Ascending graph icon replacing "A" — glowing bars + animated line -->
  <g transform="translate(108, 0)">
    <!-- Bars with gradient fill + glow -->
    <g filter="url(#barGlow)">
      <rect x="0"   y="42" width="5.5" height="6"    rx="0.8" fill="url(#barGrad)" opacity="0.50"/>
      <rect x="8"   y="35" width="5.5" height="13"   rx="0.8" fill="url(#barGrad)" opacity="0.65"/>
      <rect x="16"  y="27" width="5.5" height="21"   rx="0.8" fill="url(#barGrad)" opacity="0.82"/>
      <rect x="24"  y="19" width="5.5" height="29"   rx="0.8" fill="url(#barGrad)" opacity="1"/>
    </g>

    <!-- Ascending line connecting bar tops — glowing -->
    <polyline
      points="2.75,40 10.75,33 18.75,25 26.75,17"
      stroke="url(#lineGrad)"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      filter="url(#lineGlow)"
      stroke-dasharray="42"
      stroke-dashoffset="42"
    >
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="1.8s" fill="freeze" begin="0.3s" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </polyline>

    <!-- Data dots at bar tops — navy-300 (#4DAEE5) -->
    <circle cx="2.75" cy="40" r="1.8" fill="#4DAEE5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" fill="freeze" begin="0.3s"/>
    </circle>
    <circle cx="10.75" cy="33" r="1.8" fill="#4DAEE5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.65" dur="0.3s" fill="freeze" begin="0.8s"/>
    </circle>
    <circle cx="18.75" cy="25" r="1.8" fill="#7ECEF5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.8" dur="0.3s" fill="freeze" begin="1.2s"/>
    </circle>
    <!-- Top dot with bright glow halo -->
    <circle cx="26.75" cy="17" r="6" fill="url(#dotGlow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.6s"/>
    </circle>
    <circle cx="26.75" cy="17" r="2.2" fill="#C2E8FB" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" fill="freeze" begin="1.6s"/>
    </circle>
  </g>

