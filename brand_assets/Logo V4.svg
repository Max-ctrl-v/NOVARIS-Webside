<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" fill="none">
  <defs>
    <!-- Column gradient: navy bottom → cobalt top -->
    <linearGradient id="colGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0D1B3E"/>
      <stop offset="100%" stop-color="#1E56B5"/>
    </linearGradient>
    <!-- Line gradient: cobalt → bright blue -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E56B5"/>
      <stop offset="100%" stop-color="#4DAEE5"/>
    </linearGradient>
    <!-- Glow filter for the line -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dot glow -->
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DAEE5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4DAEE5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══ ICON AREA (left side, 0-100) ═══ -->
  <g transform="translate(10, 10)">
    <!-- Ascending columns (4 bars, growing left to right) -->
    <!-- Bar 1 - shortest -->
    <rect x="4" y="58" width="14" height="22" rx="2" fill="url(#colGrad)" opacity="0.5"/>
    <!-- Bar 2 -->
    <rect x="23" y="44" width="14" height="36" rx="2" fill="url(#colGrad)" opacity="0.65"/>
    <!-- Bar 3 -->
    <rect x="42" y="28" width="14" height="52" rx="2" fill="url(#colGrad)" opacity="0.8"/>
    <!-- Bar 4 - tallest -->
    <rect x="61" y="10" width="14" height="70" rx="2" fill="url(#colGrad)" opacity="1"/>

    <!-- Ascending graph line over the columns -->
    <polyline
      points="11,52 30,38 49,22 68,4"
      stroke="url(#lineGrad)"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      filter="url(#glow)"
    />

    <!-- Data point dots on graph line -->
    <circle cx="11" cy="52" r="3.5" fill="#4DAEE5" opacity="0.5"/>
    <circle cx="30" cy="38" r="3.5" fill="#4DAEE5" opacity="0.65"/>
    <circle cx="49" cy="22" r="3.5" fill="#4DAEE5" opacity="0.8"/>
    <circle cx="68" cy="4" r="4" fill="#4DAEE5"/>
    <!-- Bright glow on top dot -->
    <circle cx="68" cy="4" r="8" fill="url(#dotGlow)"/>
  </g>

  <!-- ═══ TEXT ═══ -->
  <!-- "NOVARIS" -->
  <text x="108" y="62" font-family="Montserrat, Arial, sans-serif" font-weight="800" font-size="46" fill="#0D1B3E" letter-spacing="4">NOVARIS</text>

  <!-- Decorative line left of CONSULTING -->
  <line x1="140" y1="82" x2="175" y2="82" stroke="#4DAEE5" stroke-width="1.2" opacity="0.6"/>
  <!-- "CONSULTING" -->
  <text x="180" y="87" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="16" fill="#6B7FA3" letter-spacing="5">CONSULTING</text>
  <!-- Decorative line right of CONSULTING -->
  <line x1="340" y1="82" x2="375" y2="82" stroke="#4DAEE5" stroke-width="1.2" opacity="0.6"/>

  <!-- Subtle baseline accent -->
  <rect x="108" y="96" width="270" height="1" rx="0.5" fill="#4DAEE5" opacity="0.12"/>
</svg>